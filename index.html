<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolt — Véhicules éligibles</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9f9f9; color: #1a1a1a; min-height: 100vh; }
  .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 28px; }
  .search-wrap { position: relative; margin-bottom: 24px; }
  .search-wrap input { width: 100%; padding: 12px 16px 12px 44px; font-size: 15px; border: 1px solid #e0e0e0; border-radius: 10px; background: #fff; color: #1a1a1a; outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: #2A9C64; }
  .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; opacity: 0.4; }
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .tab { padding: 8px 16px; font-size: 13px; border: 1px solid #e0e0e0; border-radius: 20px; cursor: pointer; background: #fff; color: #555; transition: all 0.15s; user-select: none; }
  .tab.active { background: #2A9C64; border-color: #2A9C64; color: #fff; font-weight: 600; }
  .tab:hover:not(.active) { background: #f0f0f0; border-color: #ccc; }
  .count-badge { display: inline-block; margin-left: 6px; background: #f0f0f0; color: #888; font-size: 11px; padding: 1px 7px; border-radius: 10px; }
  .tab.active .count-badge { background: rgba(255,255,255,0.25); color: #fff; }
  .results-count { font-size: 12px; color: #999; margin-bottom: 14px; }
  .brands-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .brand-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; overflow: hidden; }
  .brand-header { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; transition: background 0.15s; }
  .brand-header:hover { background: #f9f9f9; }
  .brand-header.open { background: #f0faf5; border-bottom: 1px solid #e0f0e8; }
  .brand-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .brand-count { font-size: 11px; color: #999; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; }
  .brand-header.open .brand-count { background: #d0ede0; color: #2A9C64; }
  .chevron { width: 14px; height: 14px; transition: transform 0.2s; opacity: 0.4; }
  .brand-header.open .chevron { transform: rotate(180deg); opacity: 0.7; }
  .models-list { display: none; padding: 8px 0; }
  .models-list.open { display: block; }
  .model-item { padding: 7px 16px; font-size: 13px; color: #444; border-bottom: 1px solid #f5f5f5; }
  .model-item:last-child { border-bottom: none; }
  .model-item.highlight { background: #f0faf5; color: #2A9C64; }
  .empty { text-align: center; padding: 60px; color: #aaa; font-size: 14px; }
  .footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid #e8e8e8; font-size: 12px; color: #aaa; text-align: center; }
  @media (max-width: 600px) { .brands-grid { grid-template-columns: 1fr; } .container { padding: 24px 16px; } }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <img src="https://assets.homepage.bolt.eu/1.22.14/public/common-assets/bolt-logo-black.svg" alt="Bolt" style="height:28px;" onerror="this.outerHTML='<span style=font-size:22px;font-weight:700>Bolt</span>'">
    <span style="font-size:15px;color:#aaa;">— Véhicules éligibles</span>
  </div>
  <p class="subtitle">Consultez la liste des véhicules éligibles par catégorie</p>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 16 16" fill="none">
      <circle cx="6.5" cy="6.5" r="5" stroke="#333" stroke-width="1.5"/>
      <path d="M10.5 10.5L14 14" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="text" id="search" placeholder="Rechercher un véhicule ou une marque..." oninput="filterVehicles()">
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="results-count" id="results-count"></div>
  <div class="brands-grid" id="grid"><div class="empty">Chargement...</div></div>

  <div class="footer">Bolt © 2026 — Liste des véhicules éligibles France</div>
</div>

<script>
let data = {};
let activeTab = '';
let searchTerm = '';

fetch('https://raw.githubusercontent.com/Bolt-Fr/Bolt-vehicules/main/vehicles.csv')
  .then(r => r.text())
  .then(csv => {
    const lines = csv.trim().split('\n').slice(1);
    lines.forEach(line => {
      const parts = line.split(',');
      const cat = parts[0].trim();
      const brand = parts[1].trim();
      const model = parts[2].trim();
      if (!data[cat]) data[cat] = {};
      if (!data[cat][brand]) data[cat][brand] = [];
      data[cat][brand].push(model);
    });
    Object.keys(data).forEach(cat => {
      Object.keys(data[cat]).forEach(brand => data[cat][brand].sort());
    });
    activeTab = Object.keys(data)[0];
    renderTabs();
    renderGrid();
  })
  .catch(() => {
    document.getElementById('grid').innerHTML = '<div class="empty">Erreur de chargement du fichier vehicles.csv</div>';
  });

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = Object.keys(data).map(cat => {
    const count = Object.values(data[cat]).reduce((a, b) => a + b.length, 0);
    return `<div class="tab ${cat === activeTab ? 'active' : ''}" onclick="setTab('${cat}')">${cat}<span class="count-badge">${count}</span></div>`;
  }).join('');
}

function setTab(cat) {
  activeTab = cat;
  searchTerm = '';
  document.getElementById('search').value = '';
  renderTabs();
  renderGrid();
}

function filterVehicles() {
  searchTerm = document.getElementById('search').value.toLowerCase();
  renderGrid();
}

function toggleBrand(id) {
  const header = document.getElementById('h-' + id);
  const list = document.getElementById('l-' + id);
  header.classList.toggle('open');
  list.classList.toggle('open');
}

function renderGrid() {
  const brands = data[activeTab] || {};
  const grid = document.getElementById('grid');
  const countEl = document.getElementById('results-count');

  let totalModels = 0;
  let html = '';

  const sortedBrands = Object.keys(brands).sort();

  sortedBrands.forEach((brand, i) => {
    const models = brands[brand];
    const filteredModels = searchTerm
      ? models.filter(m => m.toLowerCase().includes(searchTerm) || brand.toLowerCase().includes(searchTerm))
      : models;

    if (filteredModels.length === 0) return;
    totalModels += filteredModels.length;

    const isOpen = searchTerm !== '';
    const id = 'brand-' + i;
    html += `
      <div class="brand-card">
        <div class="brand-header ${isOpen ? 'open' : ''}" id="h-${id}" onclick="toggleBrand('${id}')">
          <span class="brand-name">${brand}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="brand-count">${filteredModels.length} modèle${filteredModels.length > 1 ? 's' : ''}</span>
            <svg class="chevron" viewBox="0 0 14 14" fill="none"><path d="M2 4.5L7 9.5L12 4.5" stroke="#666" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
        </div>
        <div class="models-list ${isOpen ? 'open' : ''}" id="l-${id}">
          ${filteredModels.map(m => `<div class="model-item ${searchTerm && m.toLowerCase().includes(searchTerm) ? 'highlight' : ''}">${m}</div>`).join('')}
        </div>
      </div>`;
  });

  if (html === '') {
    grid.innerHTML = '<div class="empty">Aucun véhicule trouvé</div>';
    countEl.textContent = '0 véhicule trouvé';
    return;
  }

  countEl.textContent = totalModels + ' véhicule' + (totalModels > 1 ? 's' : '') + ' dans ' + sortedBrands.filter(b => {
    const models = brands[b];
    return searchTerm ? models.some(m => m.toLowerCase().includes(searchTerm) || b.toLowerCase().includes(searchTerm)) : true;
  }).length + ' marque' + (sortedBrands.length > 1 ? 's' : '');
  grid.innerHTML = html;
}
</script>
</body>
</html>
